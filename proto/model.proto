syntax = "proto3";

package store;

option go_package = "github.com/gohyuhan/rift/proto";

// Checkpoint represent metadata for a dir in user's system with a user defined checkpoint name and other metadata that will be used by rift
message Checkpoint {
    string checkpoint_name = 1; // checkpoint name for checkpoint
    string checkpoint_path = 2; // the actual dir path
    string checkpoint_added_at = 3; // when was this checkpoint added
    int64 checkpoint_travelled_count = 4; // represent how many time user have traveled to this checkpoint
    bool checkpoint_is_sealed = 5; // represent if this checkpoint no longer exist in user's system
}
